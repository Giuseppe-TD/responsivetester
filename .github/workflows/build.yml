name: Build Screenlab

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installa dipendenze
        run: |
          brew install xcodegen
          pip3 install pillow

      - name: Genera AppIcon
        run: python3 generate_icon.py

      - name: Genera .xcodeproj
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -project Screenlab.xcodeproj \
            -scheme Screenlab \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip .app
        run: |
          cd build/Build/Products/Release
          zip -r Screenlab.zip Screenlab.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Screenlab
          path: build/Build/Products/Release/Screenlab.zip
          retention-days: 30
