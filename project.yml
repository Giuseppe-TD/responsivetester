name: Screenlab

options:
  deploymentTarget:
    macOS: "13.0"
  defaultConfig: Debug
  xcodeVersion: "16"

settings:
  SWIFT_VERSION: "5.9"
  MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  Screenlab:
    type: application
    platform: macOS
    sources:
      - path: DevicePreviewer
        excludes:
          - "*.entitlements"
      - path: DevicePreviewer/Assets.xcassets
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: it.tastieredigitali.Screenlab
      INFOPLIST_FILE: DevicePreviewer/Info.plist
      CODE_SIGN_ENTITLEMENTS: DevicePreviewer/DevicePreviewer.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      COMBINE_HIDPI_IMAGES: YES
      PRODUCT_NAME: Screenlab
    dependencies:
      - sdk: WebKit.framework
